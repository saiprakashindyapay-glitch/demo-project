<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Doodle SVG animations -->
  <svg class="doodle doodle-tl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <circle cx="40" cy="40" r="30" fill="none" stroke="#4ade80" stroke-width="3" stroke-dasharray="8 6" class="spin"/>
    <path d="M10 100 Q50 60 90 100 Q130 140 170 100" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" class="draw"/>
    <circle cx="160" cy="30" r="12" fill="none" stroke="#4ade80" stroke-width="2.5" class="pulse"/>
    <line x1="20" y1="160" x2="80" y2="180" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" class="wobble"/>
    <path d="M120 150 l10 -20 l10 20 l10 -20" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" class="draw"/>
  </svg>

  <svg class="doodle doodle-tr" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect x="130" y="20" width="50" height="50" rx="10" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="8 5" class="spin-r"/>
    <circle cx="40" cy="50" r="20" fill="none" stroke="#4ade80" stroke-width="2.5" class="pulse"/>
    <path d="M20 130 Q60 100 100 130 Q140 160 180 130" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" class="draw"/>
    <path d="M50 170 l8 -16 l8 16 l8 -16 l8 16" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" class="wobble"/>
  </svg>

  <svg class="doodle doodle-bl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 50 Q80 10 140 50 Q180 80 160 140" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" class="draw"/>
    <circle cx="170" cy="160" r="25" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="6 5" class="spin"/>
    <path d="M10 160 l10 -18 l10 18 l10 -18" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" class="wobble"/>
    <circle cx="60" cy="170" r="10" fill="none" stroke="#22d3ee" stroke-width="2.5" class="pulse"/>
  </svg>

  <svg class="doodle doodle-br" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="120" width="45" height="45" rx="8" fill="none" stroke="#4ade80" stroke-width="3" stroke-dasharray="7 5" class="spin-r"/>
    <circle cx="150" cy="50" r="22" fill="none" stroke="#22d3ee" stroke-width="2.5" class="pulse"/>
    <path d="M80 30 Q120 10 160 40" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" class="draw"/>
    <path d="M100 160 l9 -18 l9 18 l9 -18 l9 18" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" class="wobble"/>
  </svg>

  <!-- Floating dots -->
  <div class="dot dot1"></div>
  <div class="dot dot2"></div>
  <div class="dot dot3"></div>
  <div class="dot dot4"></div>
  <div class="dot dot5"></div>

  <div class="container">
    <h1>✅ Todo List</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Add a new task..." />
      <button id="addBtn">Add</button>
    </div>
    <ul id="todoList"></ul>
    <div class="footer" id="footer" style="display:none;">
      <span id="remaining"></span>
      <button id="clearCompleted">Clear Completed</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
